name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Activate npm 11.16 for OIDC trusted publishing
        run: |
          corepack enable
          corepack prepare npm@11.16.0 --activate
          npm --version
          node --version

      - name: Clear auth placeholders that block OIDC
        run: |
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          for rc in "$HOME/.npmrc" "${NPM_CONFIG_USERCONFIG:-}"; do
            if [ -n "$rc" ] && [ -f "$rc" ]; then
              sed -i '/:_authToken=/d' "$rc" || true
            fi
          done

      - run: npm ci

      - run: npm test

      - name: Verify tag matches library version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./projects/ngx-animating-datepicker/package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match library version $VERSION"
            exit 1
          fi

      - run: npm run lib:build

      - run: npm run copy:readme

      - name: Publish to npm via Trusted Publisher (OIDC)
        working-directory: dist/ngx-animating-datepicker
        run: npm publish --access public
