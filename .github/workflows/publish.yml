name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify npm version supports OIDC trusted publishing
        run: |
          npm --version
          node --version
          npm --version | node -e "
            const v = require('fs').readFileSync(0,'utf8').trim().split('.').map(Number);
            if (v[0] < 11 || (v[0] === 11 && v[1] < 5)) {
              console.error('npm 11.5.1+ required for trusted publishing');
              process.exit(1);
            }
          "

      - run: npm ci

      - run: npm test

      - name: Verify tag matches library version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./projects/ngx-animating-datepicker/package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match library version $VERSION"
            exit 1
          fi

      - run: npm run lib:build

      - run: npm run copy:readme

      - name: Publish to npm via Trusted Publisher (OIDC)
        run: npm publish dist/ngx-animating-datepicker --access public
