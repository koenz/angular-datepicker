version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@angular/build"
          - "ng-packagr"
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
